<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>QuickNote</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <span class="app-title">QuickNote</span>
        <span id="status-dot" class="status-dot hidden"></span>
      </div>
      <div class="header-right">
        <span id="timer" class="timer hidden">00:00</span>
        <button id="stop-btn" class="stop-header-btn hidden">完成</button>
        <button id="menu-btn" class="icon-btn" aria-label="Menu">&#8942;</button>
      </div>
    </header>

    <div id="menu-dropdown" class="menu-dropdown hidden">
      <button id="menu-history" class="menu-item">历史记录</button>
      <button id="menu-exports" class="menu-item">已导出文件</button>
      <button id="menu-settings" class="menu-item">
        <span class="menu-item-icon">&#9881;</span>设置
      </button>
    </div>

    <main id="main-content">

      <!-- Start -->
      <div id="start-screen" class="screen active">
        <div class="start-container">
          <div class="title-input-wrap">
            <input type="text" id="meeting-title" class="meeting-title-input" placeholder="输入会议主题" autocomplete="off">
          </div>
          <button id="start-btn" class="start-btn">开始记录</button>
          <p class="hint-text">点击开始后可同时记笔记</p>
        </div>
        <div id="recent-sessions" class="recent-sessions">
          <div class="section-header">
            <h3 class="section-title">最近记录</h3>
            <button id="view-all-btn" class="view-all-link">查看全部 &rsaquo;</button>
          </div>
          <div id="session-list" class="session-list"></div>
        </div>
      </div>

      <!-- Notes -->
      <div id="notes-screen" class="screen">
        <div id="recording-bar" class="recording-bar hidden"></div>
        <div id="title-bar" class="title-bar">
          <span id="current-title" class="current-title"></span>
        </div>
        <div id="notes-container" class="notes-container">
          <div id="notes-entries" class="notes-entries">
            <div id="empty-hint" class="empty-hint">在下方输入笔记要点，按发送或回车提交...</div>
          </div>
          <div class="input-row">
            <div class="format-toolbar">
              <button class="fmt-btn" data-fmt="bullet" title="列表">•</button>
              <button class="fmt-btn" data-fmt="bold" title="加粗">B</button>
              <button class="fmt-btn" data-fmt="heading" title="标题">H</button>
              <button class="fmt-btn" data-fmt="action" title="待办">☐</button>
              <button class="fmt-btn" data-fmt="highlight" title="高亮">✦</button>
            </div>
            <div class="input-group">
              <textarea id="note-input" class="note-input" placeholder="记一条笔记..." rows="2"></textarea>
              <button id="send-btn" class="send-btn" disabled>&#8593;</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Review -->
      <div id="review-screen" class="screen">
        <div class="review-scroll-area">
          <div class="review-container">
            <h2 id="review-title" class="review-title"></h2>
            <div class="review-meta">
              <span id="review-duration"></span>
              <span class="review-meta-sep">&middot;</span>
              <span id="review-count"></span>
            </div>
            <div class="review-section-label">笔记</div>
            <div id="review-notes" class="review-notes"></div>
          </div>
        </div>
        <div class="review-action-bar">
          <button id="export-btn" class="action-btn primary">导出 ZIP</button>
          <button id="share-btn" class="action-btn outlined">分享</button>
          <div id="transcribe-action-row" class="hidden" style="display:contents">
            <button id="transcribe-entry-btn" class="action-btn transcribe-btn">本地转录</button>
          </div>
        </div>
        <div class="review-footer">
          <button id="new-btn" class="new-record-link">新建记录</button>
        </div>
      </div>

      <!-- History -->
      <div id="history-screen" class="screen">
        <div class="list-screen-header">
          <button id="back-btn" class="icon-btn">&larr;</button>
          <h2>历史记录</h2>
        </div>
        <div class="list-screen-body">
          <div id="history-list" class="session-list"></div>
        </div>
      </div>

      <!-- Exports -->
      <div id="exports-screen" class="screen">
        <div class="list-screen-header">
          <button id="back-from-exports" class="icon-btn">&larr;</button>
          <h2>已导出文件</h2>
        </div>
        <div class="list-screen-body">
          <div id="exports-list"></div>
        </div>
      </div>

      <!-- Settings -->
      <div id="settings-screen" class="screen">
        <div class="list-screen-header">
          <button id="back-from-settings" class="icon-btn">&larr;</button>
          <h2>设置</h2>
        </div>
        <div class="list-screen-body">

          <!-- General settings -->
          <p class="section-title" style="margin-bottom:8px">录音设置</p>

          <div class="settings-group">
            <div class="settings-item">
              <div class="settings-item-label">
                <span>录音质量</span>
              </div>
              <select id="setting-audio-quality" class="settings-select">
                <option value="44100">标准 44.1kHz</option>
                <option value="48000">高质量 48kHz</option>
              </select>
            </div>
            <div class="settings-item">
              <div class="settings-item-label">
                <span>自动停止录音</span>
              </div>
              <select id="setting-auto-stop" class="settings-select">
                <option value="0">关闭</option>
                <option value="30">30 分钟</option>
                <option value="60">60 分钟</option>
                <option value="120">120 分钟</option>
              </select>
            </div>
            <div class="settings-item">
              <div class="settings-item-label">
                <span>导出格式</span>
              </div>
              <select id="setting-export-format" class="settings-select">
                <option value="zip">ZIP 包含全部</option>
                <option value="text">仅笔记文本</option>
              </select>
            </div>
          </div>

          <p class="section-title" style="margin-top:24px;margin-bottom:8px">存储</p>
          <div class="settings-group">
            <div class="settings-item">
              <div class="settings-item-label">
                <span>存储位置</span>
                <span class="settings-hint-text" id="storage-path-display">加载中...</span>
              </div>
            </div>
          </div>

          <p class="section-title" style="margin-top:24px;margin-bottom:8px">本地转录模型</p>
          <p class="settings-hint">模型存储在本机，下载后无需网络即可转录。每个模型只需下载一次。</p>
          <div id="settings-model-list" style="margin-top:12px"></div>

          <p class="section-title" style="margin-top:24px;margin-bottom:8px">关于</p>
          <div class="settings-group">
            <div class="settings-item">
              <div class="settings-item-label">
                <span>QuickNote</span>
                <span class="settings-hint-text">v1.7</span>
              </div>
            </div>
          </div>
          <div style="height:40px"></div>

        </div>
      </div>

      <!-- Transcription -->
      <div id="transcription-screen" class="screen">
        <div class="list-screen-header">
          <button id="back-from-transcription" class="icon-btn">&larr;</button>
          <h2>本地转录</h2>
        </div>
        <div class="list-screen-body">

          <div id="transcription-no-model" class="transcription-no-model hidden">
            <p>还没有下载转录模型。</p>
            <button id="go-to-settings-btn" class="action-btn primary" style="margin-top:12px">前往设置下载模型</button>
          </div>

          <div id="transcription-has-model">
            <p class="section-title" style="margin-bottom:8px">使用模型</p>
            <select id="transcription-model-select" class="whisper-lang-select"></select>

            <p class="section-title" style="margin-bottom:8px;margin-top:16px">语言</p>
            <select id="whisper-lang-select" class="whisper-lang-select">
              <option value="">自动检测</option>
              <option value="zh">中文 (zh)</option>
              <option value="en">English (en)</option>
              <option value="ja">日文 (ja)</option>
            </select>

            <div id="diarize-toggle-row" class="toggle-row hidden" style="margin-top:16px">
              <label class="toggle-label" for="diarize-toggle">
                <span>说话人识别</span>
                <span class="toggle-hint">区分多人发言，时间稍长</span>
              </label>
              <input type="checkbox" id="diarize-toggle" class="toggle-checkbox">
            </div>

            <div style="display:flex;gap:10px;margin-top:16px">
              <button id="transcribe-btn" class="action-btn primary" style="flex:1">开始转录</button>
              <button id="cancel-transcribe-btn" class="action-btn" style="flex:1;display:none">取消</button>
            </div>
          </div>

          <div id="transcription-progress-wrap" class="progress-wrap hidden" style="margin-top:16px">
            <div class="progress-bar-track"><div id="transcription-progress-bar" class="progress-bar-fill"></div></div>
            <div id="transcription-status" class="transcription-status"></div>
          </div>

          <div id="transcription-result" class="transcription-result hidden" style="margin-top:16px">
            <div class="result-header-row">
              <span class="section-title">转录结果</span>
              <button id="copy-transcript-btn" class="copy-btn">复制</button>
            </div>
            <div id="transcript-text" class="transcript-text"></div>
            <div class="merge-action-row">
              <button id="merge-notes-btn" class="action-btn merge-btn">&#128203; 融合笔记</button>
              <button id="share-merged-btn" class="action-btn merge-share-btn hidden">分享文档</button>
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
