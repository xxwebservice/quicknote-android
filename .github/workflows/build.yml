name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK and CMake
      run: |
        yes | sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1" || true
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Download whisper.cpp source
      run: |
        curl -L -o whisper-cpp.tar.gz \
          https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v1.7.5.tar.gz
        mkdir -p whisper-cpp-src
        tar xzf whisper-cpp.tar.gz -C whisper-cpp-src
        ls whisper-cpp-src/
        echo "WHISPER_CPP_DIR=$(pwd)/whisper-cpp-src/whisper.cpp-1.7.5" >> $GITHUB_ENV

    - name: Download sherpa-onnx AAR
      run: |
        mkdir -p app/libs
        curl -L -o app/libs/sherpa-onnx-1.12.0.aar \
          https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.0/sherpa-onnx-1.12.0.aar

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Generate signing keystore
      run: |
        # Generate a keystore with fixed credentials (same key every build)
        # The keystore file itself differs but credentials are the same,
        # and Gradle will sign with this config for consistent signatures.
        # To ensure truly identical signatures across builds, we use a
        # committed keystore. If not present, generate one.
        if [ ! -f app/quicknote.keystore ]; then
          keytool -genkeypair \
            -keystore app/quicknote.keystore \
            -storepass quicknote2026 -keypass quicknote2026 \
            -alias quicknote -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=QuickNote,OU=Dev,O=QuickNote,L=SH,ST=SH,C=CN"
          # Commit the keystore back to repo for future builds
          git config user.name "CI Bot"
          git config user.email "ci@quicknote.app"
          git add app/quicknote.keystore
          git commit -m "ci: add fixed signing keystore" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickNote-debug
        path: app/build/outputs/apk/debug/app-debug.apk
