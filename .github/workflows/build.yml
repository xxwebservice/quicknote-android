name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK and CMake
      run: |
        yes | sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1" || true
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Download whisper.cpp source
      run: |
        curl -L -o whisper-cpp.tar.gz \
          https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v1.7.5.tar.gz
        mkdir -p whisper-cpp-src
        tar xzf whisper-cpp.tar.gz -C whisper-cpp-src
        ls whisper-cpp-src/
        echo "WHISPER_CPP_DIR=$(pwd)/whisper-cpp-src/whisper.cpp-1.7.5" >> $GITHUB_ENV

    - name: Download sherpa-onnx AAR
      run: |
        mkdir -p app/libs
        curl -L -o app/libs/sherpa-onnx-1.12.0.aar \
          https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.0/sherpa-onnx-1.12.0.aar

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Setup fixed signing keystore
      run: |
        # Decode embedded PKCS12 keystore (same key every build = consistent signature)
        echo "" | base64 -d > app/quicknote.keystore

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickNote-debug
        path: app/build/outputs/apk/debug/app-debug.apk
